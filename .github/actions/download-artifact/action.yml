name: Download Zyris artifact
description: Download the Zyris artifact.

inputs:
  name:
    description: The artifact name.
    default: ${{ github.job }}
  path:
    description: The path to download and extract to.
    required: true
    default: ./

runs:
  using: composite
  steps:
    - name: Download Zyris Artifact
      uses: actions/download-artifact@v4.1.9
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
