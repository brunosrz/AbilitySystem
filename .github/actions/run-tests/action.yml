name: Run AbilitySystem Tests
description: Downloads Godot and runs the plugin unit tests. Exits cleanly for cross-compiled platforms.

inputs:
  platform:
    description: "Build target platform (linux/windows/macos/android/ios/web)"
    required: true
  arch:
    description: "Build target architecture"
    required: true

runs:
  using: "composite"
  steps:
    - name: Import dependency versions
      shell: bash
      run: |
        grep -v '^#' deps.env | grep -v '^$' >> "$GITHUB_ENV"

    - name: Download Godot
      shell: bash
      run: |
        GODOT_VERSION="${{ env.GODOT_VERSION_FOR_EXPORT }}"
        PLATFORM="${{ inputs.platform }}"

        if [ "$PLATFORM" = "android" ] || [ "$PLATFORM" = "ios" ] || [ "$PLATFORM" = "web" ]; then
          echo "[SKIP] '$PLATFORM' is cross-compiled - tests skipped on host runner."
          echo "GODOT_BIN=" >> $GITHUB_ENV
          exit 0
        fi

        MACHINE_ARCH=$(uname -m)

        if [ "$PLATFORM" = "windows" ]; then
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_win64.exe.zip"
          BIN_NAME="Godot_v${GODOT_VERSION}_win64.exe"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "$URL" -o godot.zip
          unzip godot.zip
          echo "GODOT_BIN=$(pwd)/$BIN_NAME" >> $GITHUB_ENV

        elif [ "$PLATFORM" = "linux" ]; then
          if [ "$MACHINE_ARCH" = "aarch64" ] || [ "$MACHINE_ARCH" = "arm64" ]; then
            URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.arm64.zip"
            BIN_NAME="Godot_v${GODOT_VERSION}_linux.arm64"
          else
            URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
            BIN_NAME="Godot_v${GODOT_VERSION}_linux.x86_64"
          fi
          wget --tries=5 --waitretry=5 "$URL" -o godot.zip
          unzip godot.zip
          chmod +x "$BIN_NAME"
          echo "GODOT_BIN=$(pwd)/$BIN_NAME" >> $GITHUB_ENV

        elif [ "$PLATFORM" = "macos" ]; then
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          wget --tries=5 --waitretry=5 "$URL" -o godot.zip
          unzip godot.zip
          chmod +x Godot.app/Contents/MacOS/Godot
          echo "GODOT_BIN=$(pwd)/Godot.app/Contents/MacOS/Godot" >> $GITHUB_ENV
        fi

    - name: Run Tests
      shell: bash
      run: python utility/tests.py
