name: Save Zyris build cache
description: Save Zyris build cache.
inputs:
  cache-name:
    description: The cache base name (job name by default).
    default: ${{ github.job }}
  scons-cache:
    description: The SCons cache path.
    default: ${{ github.workspace }}/.scons_cache

runs:
  using: composite
  steps:
    - name: Purge files before timestamp
      shell: bash
      run: |
        if [ -f "misc/scripts/purge_cache.py" ]; then
          python3 misc/scripts/purge_cache.py ${{ env.CACHE_TIMESTAMP }} "${{ inputs.scons-cache }}"
        elif [ -f "zyris/misc/scripts/purge_cache.py" ]; then
          python3 zyris/misc/scripts/purge_cache.py ${{ env.CACHE_TIMESTAMP }} "${{ inputs.scons-cache }}"
        else
          echo "Warning: purge_cache.py not found. Skipping cache purge."
        fi

    - name: Save SCons cache directory
      uses: actions/cache/save@v4.2.2
      with:
        path: ${{ inputs.scons-cache }}
        key: ${{ inputs.cache-name }}|${{ github.ref_name }}|${{ github.sha }}
