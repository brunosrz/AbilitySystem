name: 🤖 Android GDExtension

on:
  workflow_call:
    inputs:
      plugin-version:
        required: true
        type: string
      godot-cpp-version:
        required: true
        type: string
  workflow_dispatch:

jobs:
  build:
    name: 🧩 GDExtension (${{ matrix.target }}, ${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [editor, template_release]
        arch: [arm64, x86_64]
        float-precision: [single]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Import dependency versions
        shell: bash
        run: |
          grep -v '^#' deps.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Fetch godot-cpp
        uses: actions/checkout@v4.2.2
        with:
          repository: godotengine/godot-cpp
          ref: ${{ inputs.godot-cpp-version }}
          path: godot-cpp
          submodules: recursive


      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup NDK
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: android

      - name: Restore .scons_cache
        uses: ./.github/actions/zyris-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons_cache
          cache-name: gdext_android_${{ matrix.arch }}_${{ matrix.target }}-${{ env.GODOT_VERSION }}

      - name: Build GDExtension (Android Target)
        shell: bash
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons_cache
        run: |
          scons target=${{ matrix.target }} platform=android arch=${{ matrix.arch }} precision=${{ matrix.float-precision }} ANDROID_HOME=$ANDROID_HOME ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT

      - name: Save .scons_cache
        uses: ./.github/actions/zyris-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons_cache
          cache-name: gdext_android_${{ matrix.arch }}_${{ matrix.target }}-${{ env.GODOT_VERSION }}

      - name: Prepare Plugin Structure
        shell: bash
        run: |
          mkdir -p tmp-builds/out/addons/${{ env.MODULE_NAME }}/bin
          mkdir -p tmp-builds/out/addons/${{ env.MODULE_NAME }}/icons
          cp gdextension/* tmp-builds/out/addons/${{ env.MODULE_NAME }}/ 2>/dev/null || true
          cp README.md README.pt.md release_note.md release_note.pt.md tmp-builds/out/addons/${{ env.MODULE_NAME }}/ 2>/dev/null || true
          cp src/icons/*.svg tmp-builds/out/addons/${{ env.MODULE_NAME }}/icons/ 2>/dev/null || true
          find addons/${{ env.MODULE_NAME }}/bin/ -maxdepth 1 -name "*.so" -exec cp {} tmp-builds/out/addons/${{ env.MODULE_NAME }}/bin/ \;

      - name: Cache Build for Packaging
        uses: actions/cache/save@v4.2.2
        with:
          path: tmp-builds/out/
          key: tmp-bin-${{ github.run_id }}-android-${{ matrix.arch }}-${{ matrix.float-precision }}-${{ matrix.target }}
