name: 🎮 Singleplayer Tests

on:
  workflow_call:
    inputs:
      godot-bin-name:
        required: false
        type: string
        description: "Name of Godot binary (provided by infrastructure, not used in this workflow)"

jobs:
  run-singleplayer:
    name: 🎮 Run Singleplayer Tests
    if: |
      !contains(github.event.head_commit.message, '[tests skip]') &&
      !contains(github.event.head_commit.message, '[integration skip]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Restore Test Binaries from Cache
        uses: actions/cache/restore@v4
        with:
          path: dist/
          key: ${{ github.sha }}-test-binaries
          fail-on-cache-miss: true

      - name: Deploy Binaries
        run: |
          # Copy addons and resources next to the exported demo client
          # (Godot looks for res:// paths relative to the executable)
          mkdir -p dist/demo_client
          cp -r dist/standard/addons dist/demo_client/

          # Verify GDExtension is present
          echo "=== Checking GDExtension in demo_client ==="
          if [ -f "dist/demo_client/addons/ability_system/bin/libability_system.linux.editor.x86_64.so" ]; then
            echo "✅ GDExtension found!"
            ls -lh dist/demo_client/addons/ability_system/bin/
          else
            echo "❌ GDExtension NOT found!"
            echo "Contents of dist/demo_client/addons:"
            find dist/demo_client/addons -type f | head -20
            exit 1
          fi

          cp -r dist/godot/* .

      - name: Setup Environment
        run: |
          BIN_NAME="${{ inputs.godot-bin-name }}"
          chmod +x "$BIN_NAME"
          echo "GODOT_BIN=$(pwd)/$BIN_NAME" >> $GITHUB_ENV

      - name: Run Singleplayer Demo Client
        timeout-minutes: 2
        run: |
          echo "🎮 Starting Singleplayer Demo..."
          ./dist/demo_client/demo_linux_client --headless 2>&1 | tee singleplayer_test.log &
          CLIENT_PID=$!

          # Give client time to start and verify it doesn't crash immediately
          sleep 5

          # Check if process is still running
          if kill -0 $CLIENT_PID 2>/dev/null; then
            echo "✅ Singleplayer demo started successfully"
            kill $CLIENT_PID 2>/dev/null || true
            wait $CLIENT_PID 2>/dev/null || true
          else
            echo "❌ Singleplayer demo crashed on startup"
            cat singleplayer_test.log
            exit 1
          fi

      - name: Upload Singleplayer Test Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: singleplayer-test-log
          path: singleplayer_test.log
          retention-days: 7
