<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Indigo-Cyan para o Logo -->
    <linearGradient id="kaffynGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" /> <!-- Indigo-500 -->
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" /> <!-- Cyan-500 -->
    </linearGradient>

    <!-- Fonte Simulada: Usando uma fonte geométrica robusta do sistema como base -->
    <style>
      .kaffyn-logo {
        font-family: 'Arial Black', 'Helvetica Neue', 'Arial', sans-serif; /* Substitua pela sua fonte customizada quando pronta */
        font-weight: 900;
        letter-spacing: -2px; /* Tracking apertado para solidez */
        text-transform: uppercase;
        fill: url(#kaffynGradient);
      }

      /* Detalhe estilizado para o 'K' (Corte Diagonal) */
      .k-cut {
        stroke: #ffffff;
        stroke-width: 2;
        opacity: 0.8;
      }
    </style>
  </defs>

  <!-- Fundo Sutil (Opcional) -->
  <rect width="400" height="150" rx="20" fill="#09090b" />

  <!-- Texto Principal -->
  <text x="200" y="100" class="kaffyn-logo" text-anchor="middle">
    KAFFYN
  </text>

  <!-- Elemento Decorativo: Linha de Base Futurista -->
  <line x1="80" y1="125" x2="320" y2="125" stroke="#3f3f46" stroke-width="1" />
</svg>
